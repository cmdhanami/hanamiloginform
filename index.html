    <table>

          <td>
    <h1 > Login</h1>
             
    <form>
            
    <label for="username">Username:</label><br/>
    <input type="text" id="username" name="username" placeholder="Enter username"/><br/>
<br/>    
    
      <label for="password">Password:</label><br/>
    <input type="text" id="password" name="password" placeholder="Enter password"/><br/>
        
<br/>    
    
    
    <input type="checkbox" id="remember" name="remember"/>   
<label for="remember">Remember me</label><br/><br/>
    
    <button type="button"id="button1"  onclick="checkLogin()"> Submit </button>
    <button type="button" id="button2" onclick="clearForm()"> Cancel </button>
         </form>
              <p id="error-message" style="color:red; display:none;">
Invalid username or password!
</p>
                  </td>

  </tr>
     
  
    </table>

    <script>
    /*step 1:Set your correct username and password*/
    var correctUsername = "hanami";
    var correctPassword = "123456";
    /*step 2:This function run when you clicked submit*/
    function checkLogin() {
        /*Read whatever the user typed into each field*/
       var enteredUsername = document.getElementById("username").value;
       var enteredPassword = document.getElementById("password").value;
        
        // compare what the user typed withthe correct values
        if (enteredUsername === correctUsername && enteredPassword === correctPassword) {
            //if its correct then it will...
            window.location.href ="abtme.html";
            
        }else {
            
            document.getElementById("error-message").style.display = "block";
        }
        
    }
        //step 3: cancel button clears the form
        function clearForm() {
            document.getElementById("username").value = "" ;
            document.getElementsById("password").value = "" ;
            document.getElementsById("error-message").style.display = "none";
            
        }
        
        
        
        
        
        
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    </script>
